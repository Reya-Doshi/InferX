# deploy/helm/inferx/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferx.fullname" . }}-service
  labels:
    {{- include "inferx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "inferx.selectorLabels" . | nindent 4 }}
